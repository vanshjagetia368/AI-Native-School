<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cognitive Intelligence Report — SCIR</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #0a0e17;
            --surface: #111827;
            --card: #1a2235;
            --card-border: #1e293b;
            --text: #e2e8f0;
            --muted: #64748b;
            --accent: #22d3ee;
            --accent2: #a78bfa;
            --accent3: #34d399;
            --accent4: #f472b6;
            --accent5: #fb923c;
            --danger: #ef4444;
            --warning: #f59e0b;
            --glass: rgba(17, 24, 39, 0.7);
            --glow: 0 0 30px rgba(34, 211, 238, 0.15)
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh
        }

        .scir-wrap {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px 32px 80px
        }

        /* Header */
        .scir-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid var(--card-border);
            margin-bottom: 32px
        }

        .scir-back {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: color .2s
        }

        .scir-back:hover {
            color: var(--accent)
        }

        .scir-title-block h1 {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .scir-title-block p {
            font-size: 12px;
            color: var(--muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 2px
        }

        .scir-header-actions {
            display: flex;
            gap: 12px
        }

        .btn-export {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border: 1px solid var(--card-border);
            border-radius: 10px;
            background: var(--card);
            color: var(--text);
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all .3s
        }

        .btn-export:hover {
            border-color: var(--accent);
            box-shadow: var(--glow)
        }

        .btn-export.primary {
            background: linear-gradient(135deg, #0891b2, #06b6d4);
            border: none;
            color: #fff
        }

        /* Student Meta Bar */
        .meta-bar {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 32px
        }

        .meta-chip {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            font-size: 13px
        }

        .meta-chip .label {
            color: var(--muted);
            font-weight: 500
        }

        .meta-chip .val {
            font-weight: 700
        }

        /* Behavioral Badge */
        .profile-badge-section {
            margin-bottom: 40px;
            text-align: center
        }

        .profile-badge {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 16px 32px;
            background: linear-gradient(135deg, rgba(34, 211, 238, 0.1), rgba(167, 139, 250, 0.1));
            border: 1px solid rgba(34, 211, 238, 0.2);
            border-radius: 16px;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: -0.3px
        }

        .profile-badge .icon {
            font-size: 28px
        }

        .profile-subtitle {
            margin-top: 12px;
            font-size: 13px;
            color: var(--muted);
            max-width: 600px;
            margin-left: auto;
            margin-right: auto
        }

        /* Tags */
        .tags-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 16px
        }

        .btag {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase
        }

        .btag-cyan {
            background: rgba(34, 211, 238, 0.15);
            color: #22d3ee;
            border: 1px solid rgba(34, 211, 238, 0.3)
        }

        .btag-purple {
            background: rgba(167, 139, 250, 0.15);
            color: #a78bfa;
            border: 1px solid rgba(167, 139, 250, 0.3)
        }

        .btag-green {
            background: rgba(52, 211, 153, 0.15);
            color: #34d399;
            border: 1px solid rgba(52, 211, 153, 0.3)
        }

        .btag-amber {
            background: rgba(245, 158, 11, 0.15);
            color: #f59e0b;
            border: 1px solid rgba(245, 158, 11, 0.3)
        }

        .btag-pink {
            background: rgba(244, 114, 182, 0.15);
            color: #f472b6;
            border: 1px solid rgba(244, 114, 182, 0.3)
        }

        .btag-red {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3)
        }

        /* KPI Grid */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 40px
        }

        .kpi-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 24px;
            position: relative;
            overflow: hidden;
            transition: transform .3s, box-shadow .3s
        }

        .kpi-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--glow)
        }

        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            border-radius: 16px 16px 0 0
        }

        .kpi-card:nth-child(1)::before {
            background: linear-gradient(90deg, #22d3ee, #06b6d4)
        }

        .kpi-card:nth-child(2)::before {
            background: linear-gradient(90deg, #a78bfa, #8b5cf6)
        }

        .kpi-card:nth-child(3)::before {
            background: linear-gradient(90deg, #34d399, #10b981)
        }

        .kpi-card:nth-child(4)::before {
            background: linear-gradient(90deg, #f472b6, #ec4899)
        }

        .kpi-card:nth-child(5)::before {
            background: linear-gradient(90deg, #fb923c, #f97316)
        }

        .kpi-card:nth-child(6)::before {
            background: linear-gradient(90deg, #38bdf8, #0ea5e9)
        }

        .kpi-label {
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
            margin-bottom: 8px
        }

        .kpi-value {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: -1px
        }

        .kpi-sub {
            font-size: 12px;
            color: var(--muted);
            margin-top: 4px
        }

        .kpi-c1 {
            color: #22d3ee
        }

        .kpi-c2 {
            color: #a78bfa
        }

        .kpi-c3 {
            color: #34d399
        }

        .kpi-c4 {
            color: #f472b6
        }

        .kpi-c5 {
            color: #fb923c
        }

        .kpi-c6 {
            color: #38bdf8
        }

        /* Chart Sections */
        .section-title {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--muted);
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 16px;
            border-radius: 2px;
            background: linear-gradient(180deg, var(--accent), var(--accent2))
        }

        .charts-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 40px
        }

        .chart-card {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 28px;
            transition: box-shadow .3s
        }

        .chart-card:hover {
            box-shadow: var(--glow)
        }

        .chart-card h3 {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 16px
        }

        .chart-card canvas {
            width: 100% !important
        }

        /* Narrative Section */
        .narrative-section {
            margin-bottom: 40px
        }

        .narrative-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px
        }

        .narrative-card {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 24px
        }

        .narrative-card h4 {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px
        }

        .narrative-card p {
            font-size: 13px;
            color: var(--muted);
            line-height: 1.8
        }

        .narrative-card.full-width {
            grid-column: 1/-1
        }

        /* Classification Grid */
        .class-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            margin-bottom: 40px
        }

        .class-card {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 20px;
            display: flex;
            gap: 16px;
            align-items: flex-start;
            transition: border-color .3s
        }

        .class-card:hover {
            border-color: rgba(34, 211, 238, 0.3)
        }

        .class-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0
        }

        .class-card h4 {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 4px
        }

        .class-card p {
            font-size: 12px;
            color: var(--muted);
            line-height: 1.6
        }

        /* Footer */
        .scir-footer {
            text-align: center;
            padding: 40px 0;
            border-top: 1px solid var(--card-border);
            margin-top: 40px;
            font-size: 12px;
            color: var(--muted)
        }

        /* Animations */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(24px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        @keyframes countUp {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        .anim-in {
            animation: fadeUp .6s cubic-bezier(.22, .68, 0, 1.2) both
        }

        .anim-d1 {
            animation-delay: .1s
        }

        .anim-d2 {
            animation-delay: .2s
        }

        .anim-d3 {
            animation-delay: .3s
        }

        .anim-d4 {
            animation-delay: .4s
        }

        /* Responsive */
        @media(max-width:900px) {

            .charts-row,
            .narrative-grid {
                grid-template-columns: 1fr
            }

            .kpi-grid {
                grid-template-columns: repeat(2, 1fr)
            }

            .scir-wrap {
                padding: 16px
            }
        }

        @media(max-width:600px) {
            .kpi-grid {
                grid-template-columns: 1fr
            }

            .meta-bar {
                flex-direction: column
            }
        }

        /* Print override */
        @media print {
            body {
                background: #fff;
                color: #000
            }

            .scir-wrap {
                padding: 0
            }

            .kpi-card,
            .chart-card,
            .narrative-card,
            .class-card {
                break-inside: avoid;
                box-shadow: none;
                border: 1px solid #ddd
            }
        }
    </style>
</head>

<body>
    <div class="scir-wrap" id="report-root">
        <div id="loading"
            style="display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:16px">
            <div
                style="width:48px;height:48px;border:3px solid var(--card-border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite">
            </div>
            <p style="color:var(--muted);font-size:14px">Loading Cognitive Intelligence Report...</p>
        </div>
        <style>
            @keyframes spin {
                to {
                    transform: rotate(360deg)
                }
            }
        </style>
    </div>

    <script type="module">
        import { getSession, getSchool } from '../../js/storage.js';
        import { requireAdmin } from '../../js/session.js';

        const session = requireAdmin();
        if (!session) throw new Error('Redirecting...');

        const urlParams = new URLSearchParams(window.location.search);
        const studentId = urlParams.get('studentId');
        const attemptId = urlParams.get('attemptId');

        function init() {
            if (!studentId || !attemptId) { showError('Invalid parameters.'); return; }
            const school = getSchool(session.schoolCode);
            if (!school) { showError('School not found.'); return; }

            let studentData = null, className = '';
            for (const cls of school.classes) {
                const s = cls.students.find(st => st.studentId === studentId);
                if (s) { studentData = s; className = cls.className; break; }
            }
            if (!studentData || !studentData.attempts || !studentData.attempts[attemptId]) {
                showError('Record not found.'); return;
            }
            if (session.role === 'teacher' && session.teacherClass !== className) {
                showError('Unauthorized.'); return;
            }
            const attempt = studentData.attempts[attemptId];
            renderDashboard(school, studentData, className, attempt);
        }

        function showError(msg) {
            document.getElementById('loading').innerHTML = `<p style="color:var(--danger);font-size:16px">${msg}</p>`;
        }

        // ═══ ANALYTICS ENGINE ═══
        function computeAnalytics(attempt) {
            const r = attempt.responses || {};
            const tpq = attempt.timePerQuestion || {};
            const sc = attempt.traitScores || { O: 0, C: 0, E: 0, A: 0, N: 0 };
            const ci = attempt.computedInsights || {};
            const conf = attempt.confidenceScore || 50;
            const dur = attempt.durationSeconds || 0;
            const skipped = attempt.skippedQuestions || 0;
            const totalQ = 30;
            const answered = Object.keys(r).length;

            // Response values & times
            const rVals = Object.values(r);
            const tVals = Object.values(tpq).map(Number);
            const avgTime = tVals.length > 0 ? tVals.reduce((a, b) => a + b, 0) / tVals.length : 0;
            const maxTime = Math.max(...tVals, 1);
            const minTime = Math.min(...tVals, 0);

            // Std deviation helper
            const stdDev = (arr) => {
                if (arr.length < 2) return 0;
                const mean = arr.reduce((a, b) => a + b, 0) / arr.length;
                return Math.sqrt(arr.reduce((s, v) => s + (v - mean) ** 2, 0) / arr.length);
            };

            // KPIs
            const traitVals = Object.values(sc);
            const cogEfficiency = Math.round(traitVals.reduce((a, b) => a + b, 0) / traitVals.length);
            const consistencyIndex = rVals.length > 1 ? Math.max(0, Math.round(100 - stdDev(rVals) * 20)) : 50;
            const focusStability = tVals.length > 1 ? Math.max(0, Math.round(100 - (stdDev(tVals) / (avgTime || 1)) * 50)) : 50;
            const riskTolerance = Math.round((100 - sc.N) * 0.5 + sc.O * 0.3 + sc.E * 0.2);
            const confCalibration = Math.max(0, Math.round(100 - Math.abs(conf - cogEfficiency)));
            const speedAccuracy = answered > 0 ? Math.round((answered / totalQ) * 100 * (1 - avgTime / (maxTime * 2 || 1))) : 0;

            // Behavioral Tags
            const tags = [];
            const p80Time = tVals.length > 0 ? [...tVals].sort((a, b) => a - b)[Math.floor(tVals.length * 0.8)] : avgTime;
            const p30Time = tVals.length > 0 ? [...tVals].sort((a, b) => a - b)[Math.floor(tVals.length * 0.3)] : avgTime;

            if (cogEfficiency > 65 && avgTime > p80Time * 0.8) tags.push({ label: 'Overthinker', icon: '🤔', color: 'purple', desc: 'High trait scores but slower response times suggest deep deliberation.' });
            if (cogEfficiency < 45 && avgTime < p30Time * 1.2) tags.push({ label: 'Careless Responder', icon: '⚡', color: 'red', desc: 'Fast responses with low engagement quality.' });
            if (skipped / totalQ > 0.15) tags.push({ label: 'Low Persistence', icon: '🚪', color: 'amber', desc: 'More than 15% of questions were skipped.' });
            if (Math.abs(conf - cogEfficiency) > 25) tags.push({ label: 'Confidence Gap', icon: '🎯', color: 'pink', desc: 'Self-reported confidence diverges from profile scores.' });

            // Cognitive fatigue: check if last-third times are longer
            if (tVals.length >= 9) {
                const third = Math.floor(tVals.length / 3);
                const firstThirdAvg = tVals.slice(0, third).reduce((a, b) => a + b, 0) / third;
                const lastThirdAvg = tVals.slice(-third).reduce((a, b) => a + b, 0) / third;
                if (lastThirdAvg > firstThirdAvg * 1.3) tags.push({ label: 'Cognitive Fatigue', icon: '😴', color: 'amber', desc: 'Response times increased significantly in the final segment.' });
            }

            // Adaptive learner: times decrease while quality stays
            if (tVals.length >= 9) {
                const third = Math.floor(tVals.length / 3);
                const firstAvg = tVals.slice(0, third).reduce((a, b) => a + b, 0) / third;
                const lastAvg = tVals.slice(-third).reduce((a, b) => a + b, 0) / third;
                if (lastAvg < firstAvg * 0.8) tags.push({ label: 'Adaptive Learner', icon: '🚀', color: 'green', desc: 'Response times improved over the session — efficient adaptation.' });
            }

            if (ci.impulsivity && /high/i.test(ci.impulsivity)) tags.push({ label: 'Impulsive Decision Bias', icon: '💥', color: 'red', desc: 'Pattern of fast, reactive decision-making detected.' });
            if (tags.length === 0) tags.push({ label: 'Balanced Profile', icon: '⚖️', color: 'cyan', desc: 'No extreme behavioral patterns detected.' });

            return {
                sc, ci, conf, dur, skipped, answered, totalQ,
                rVals, tVals, avgTime,
                kpis: { cogEfficiency, consistencyIndex, focusStability, riskTolerance, confCalibration, speedAccuracy: Math.max(0, Math.min(100, speedAccuracy)) },
                tags
            };
        }

        // ═══ RENDER DASHBOARD ═══
        function renderDashboard(school, student, className, attempt) {
            const A = computeAnalytics(attempt);
            const dTaken = attempt.startedAt ? new Date(attempt.startedAt).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' }) : 'N/A';
            const profileLabel = A.ci.nature || 'Balanced Profile';
            const tagColors = { cyan: 'btag-cyan', purple: 'btag-purple', green: 'btag-green', amber: 'btag-amber', pink: 'btag-pink', red: 'btag-red' };

            document.getElementById('report-root').innerHTML = `
            <!-- Header -->
            <div class="scir-header anim-in">
                <div>
                    <a href="../reports.html" class="scir-back">← Back to Reports</a>
                    <div class="scir-title-block"><h1>Student Cognitive Intelligence Report</h1><p>SCIR • Psychometric Analytics Engine v2.0</p></div>
                </div>
                <div class="scir-header-actions">
                    <button class="btn-export" onclick="window.print()">🖨 Print</button>
                    <button class="btn-export primary" id="pdf-btn">📥 Export PDF</button>
                </div>
            </div>

            <!-- Meta -->
            <div class="meta-bar anim-in anim-d1">
                <div class="meta-chip"><span class="label">Student</span><span class="val">${student.name}</span></div>
                <div class="meta-chip"><span class="label">ID</span><span class="val">${student.studentId}</span></div>
                <div class="meta-chip"><span class="label">Class</span><span class="val">${className}</span></div>
                <div class="meta-chip"><span class="label">School</span><span class="val">${school.schoolName}</span></div>
                <div class="meta-chip"><span class="label">Date</span><span class="val">${dTaken}</span></div>
                <div class="meta-chip"><span class="label">Duration</span><span class="val">${Math.floor(A.dur / 60)}m ${A.dur % 60}s</span></div>
            </div>

            <!-- Behavioral Profile Badge -->
            <div class="profile-badge-section anim-in anim-d2">
                <div class="profile-badge"><span class="icon">🧬</span> ${profileLabel}</div>
                <div class="tags-row">${A.tags.map(t => `<span class="btag ${tagColors[t.color] || 'btag-cyan'}">${t.icon} ${t.label}</span>`).join('')}</div>
                <p class="profile-subtitle">${A.ci.narrative || 'Behavioral analysis based on psychometric response patterns, temporal dynamics, and self-reported confidence calibration.'}</p>
            </div>

            <!-- KPI Grid -->
            <div class="section-title anim-in anim-d3">Advanced Intelligence Metrics</div>
            <div class="kpi-grid anim-in anim-d3">
                <div class="kpi-card"><div class="kpi-label">Cognitive Efficiency</div><div class="kpi-value kpi-c1" data-count="${A.kpis.cogEfficiency}">0</div><div class="kpi-sub">Weighted OCEAN Composite</div></div>
                <div class="kpi-card"><div class="kpi-label">Consistency Index</div><div class="kpi-value kpi-c2" data-count="${A.kpis.consistencyIndex}">0</div><div class="kpi-sub">Response Variance Score</div></div>
                <div class="kpi-card"><div class="kpi-label">Focus Stability</div><div class="kpi-value kpi-c3" data-count="${A.kpis.focusStability}">0</div><div class="kpi-sub">Temporal Attention Score</div></div>
                <div class="kpi-card"><div class="kpi-label">Risk Tolerance</div><div class="kpi-value kpi-c4" data-count="${A.kpis.riskTolerance}">0</div><div class="kpi-sub">Decision Volatility Index</div></div>
                <div class="kpi-card"><div class="kpi-label">Confidence Calibration</div><div class="kpi-value kpi-c5" data-count="${A.kpis.confCalibration}">0</div><div class="kpi-sub">Self-Perception Accuracy</div></div>
                <div class="kpi-card"><div class="kpi-label">Speed-Quality Ratio</div><div class="kpi-value kpi-c6" data-count="${A.kpis.speedAccuracy}">0</div><div class="kpi-sub">Efficiency Tradeoff</div></div>
            </div>

            <!-- Charts Row 1 -->
            <div class="section-title anim-in anim-d4">Cognitive Pattern Visualization</div>
            <div class="charts-row anim-in anim-d4">
                <div class="chart-card"><h3>🧠 OCEAN Trait Radar</h3><canvas id="radarChart"></canvas></div>
                <div class="chart-card"><h3>📊 Trait Distribution</h3><canvas id="traitBar"></canvas></div>
            </div>

            <!-- Charts Row 2 -->
            <div class="charts-row anim-in">
                <div class="chart-card"><h3>⏱ Response Time Heatmap</h3><canvas id="timeChart"></canvas></div>
                <div class="chart-card"><h3>🔄 Persistence Funnel</h3><canvas id="funnelChart"></canvas></div>
            </div>

            <!-- AI Narrative -->
            <div class="section-title">🤖 AI Narrative Intelligence</div>
            <div class="narrative-grid">
                <div class="narrative-card"><h4>📋 Executive Summary</h4><p>${generateExecSummary(A, student)}</p></div>
                <div class="narrative-card"><h4>💪 Cognitive Strengths</h4><p>${generateStrengths(A)}</p></div>
                <div class="narrative-card"><h4>🌱 Growth Zones</h4><p>${generateGrowthZones(A)}</p></div>
                <div class="narrative-card"><h4>⚠️ Behavioral Risk Indicators</h4><p>${generateRisks(A)}</p></div>
                <div class="narrative-card full-width"><h4>🎯 Learning Strategy Recommendations</h4><p>${generateRecommendations(A)}</p></div>
            </div>

            <!-- Classification Grid -->
            <div class="section-title" style="margin-top:40px">🏷 Behavioral Classification Tags</div>
            <div class="class-grid">${A.tags.map(t => `
                <div class="class-card">
                    <div class="class-icon" style="background:${t.color === 'cyan' ? 'rgba(34,211,238,0.15)' : t.color === 'purple' ? 'rgba(167,139,250,0.15)' : t.color === 'green' ? 'rgba(52,211,153,0.15)' : t.color === 'amber' ? 'rgba(245,158,11,0.15)' : t.color === 'pink' ? 'rgba(244,114,182,0.15)' : 'rgba(239,68,68,0.15)'}">${t.icon}</div>
                    <div><h4>${t.label}</h4><p>${t.desc}</p></div>
                </div>`).join('')}
            </div>

            <!-- Footer -->
            <div class="scir-footer">
                <p>AI Native Schools — Cognitive Intelligence Platform</p>
                <p style="margin-top:4px">Report generated ${new Date().toLocaleString('en-GB')} • SCIR v2.0 • ${attempt.attemptId || 'N/A'}</p>
            </div>`;

            // Init charts & animations
            setTimeout(() => { initCharts(A); animateCounters(); initPDFExport(); }, 100);
        }

        // ═══ NARRATIVE GENERATORS ═══
        function generateExecSummary(A, student) {
            const strongest = Object.entries(A.sc).sort((a, b) => b[1] - a[1]).map(e => ({ O: 'Openness', C: 'Conscientiousness', E: 'Extraversion', A: 'Agreeableness', N: 'Neuroticism' }[e[0]]));
            return `${student.name} completed a comprehensive psychometric assessment comprising ${A.totalQ} cognitive and behavioral items. ${A.answered} questions were answered over ${Math.floor(A.dur / 60)} minutes. The dominant trait profile indicates strong ${strongest[0]} (${A.sc[Object.entries(A.sc).sort((a, b) => b[1] - a[1])[0][0]]}%) with notable ${strongest[1]} tendencies. Overall cognitive efficiency registers at ${A.kpis.cogEfficiency}%, placing this individual in the ${A.kpis.cogEfficiency > 70 ? 'upper' : A.kpis.cogEfficiency > 50 ? 'middle' : 'developing'} performance tier. Confidence calibration of ${A.kpis.confCalibration}% indicates ${A.kpis.confCalibration > 75 ? 'strong self-awareness alignment' : A.kpis.confCalibration > 50 ? 'moderate self-perception accuracy' : 'a notable gap between self-perception and measured profile'}.`;
        }

        function generateStrengths(A) {
            const top = Object.entries(A.sc).sort((a, b) => b[1] - a[1]).slice(0, 2);
            const TN = { O: 'Openness', C: 'Conscientiousness', E: 'Extraversion', A: 'Agreeableness', N: 'Neuroticism' };
            const descs = { O: 'intellectual curiosity, creative thinking, and openness to new experiences', C: 'self-discipline, organization, and goal-directed behavior', E: 'social engagement, assertiveness, and positive energy in group settings', A: 'empathy, cooperation, and social harmony', N: 'emotional depth and heightened sensitivity to environmental stimuli' };
            return `Primary strength: <strong>${TN[top[0][0]]}</strong> at ${top[0][1]}% — demonstrating ${descs[top[0][0]]}. Secondary strength: <strong>${TN[top[1][0]]}</strong> at ${top[1][1]}% — characterized by ${descs[top[1][0]]}. Focus stability at ${A.kpis.focusStability}% and consistency index at ${A.kpis.consistencyIndex}% further reinforce reliable cognitive engagement patterns.`;
        }

        function generateGrowthZones(A) {
            const bottom = Object.entries(A.sc).filter(e => e[0] !== 'N').sort((a, b) => a[1] - b[1]).slice(0, 2);
            const TN = { O: 'Openness', C: 'Conscientiousness', E: 'Extraversion', A: 'Agreeableness' };
            const tips = { O: 'exposure to diverse perspectives and creative problem-solving exercises', C: 'structured goal-setting and incremental habit formation', E: 'gradually increasing social participation in supportive environments', A: 'active listening exercises and collaborative team-based projects' };
            return `Development area: <strong>${TN[bottom[0][0]] || bottom[0][0]}</strong> at ${bottom[0][1]}% — this dimension may benefit from ${tips[bottom[0][0]] || 'targeted development'}. Additional growth opportunity in <strong>${TN[bottom[1][0]] || bottom[1][0]}</strong> at ${bottom[1][1]}%. These areas represent the highest-leverage zones for meaningful behavioral development.`;
        }

        function generateRisks(A) {
            if (A.tags.length <= 1 && A.tags[0]?.label === 'Balanced Profile') return 'No significant behavioral risk indicators were detected in this assessment. The response pattern demonstrates stability across all measured dimensions.';
            return A.tags.filter(t => ['Careless Responder', 'Low Persistence', 'Cognitive Fatigue', 'Impulsive Decision Bias', 'Confidence Gap'].includes(t.label)).map(t => `<strong>${t.label}:</strong> ${t.desc}`).join(' ') || 'Minor behavioral variations detected, but within normal operational range. Continued monitoring recommended for longitudinal trend analysis.';
        }

        function generateRecommendations(A) {
            const recs = [];
            if (A.sc.O < 50) recs.push('Introduce creative and divergent thinking activities — mind-mapping, brainstorming sessions, exposure to interdisciplinary topics.');
            if (A.sc.C < 50) recs.push('Implement structured daily routines with clear milestones. Use checklists and time-blocking to reinforce organizational habits.');
            if (A.sc.E < 40) recs.push('Create low-pressure social engagement opportunities — pair work, small group discussions, collaborative projects.');
            if (A.sc.A < 40) recs.push('Encourage perspective-taking exercises and empathy-building activities. Conflict resolution workshops may benefit.');
            if (A.sc.N > 70) recs.push('Introduce stress management techniques — mindfulness, deep breathing, journaling. Provide a safe space for emotional expression.');
            if (A.kpis.focusStability < 50) recs.push('Consider attention scaffolding — shorter task segments with breaks, visual progress trackers, environment optimization.');
            if (A.kpis.confCalibration < 50) recs.push('Metacognitive training recommended — self-assessment journals, calibration exercises, and reflection prompts after tests.');
            if (recs.length === 0) recs.push('Continue current developmental trajectory. Regular reassessment at 3-month intervals recommended to track longitudinal cognitive growth patterns.');
            return recs.join(' ');
        }

        // ═══ CHARTS ═══
        function initCharts(A) {
            const sc = A.sc;
            // Radar
            new Chart(document.getElementById('radarChart'), {
                type: 'radar',
                data: {
                    labels: ['Openness', 'Conscientiousness', 'Extraversion', 'Agreeableness', 'Neuroticism'],
                    datasets: [{
                        label: 'Trait Profile',
                        data: [sc.O, sc.C, sc.E, sc.A, sc.N],
                        backgroundColor: 'rgba(34,211,238,0.15)',
                        borderColor: '#22d3ee',
                        borderWidth: 2,
                        pointBackgroundColor: '#22d3ee',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 1,
                        pointRadius: 5,
                        pointHoverRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    scales: { r: { beginAtZero: true, max: 100, ticks: { stepSize: 20, color: '#64748b', backdropColor: 'transparent', font: { size: 10 } }, grid: { color: 'rgba(100,116,139,0.15)' }, pointLabels: { color: '#e2e8f0', font: { size: 12, weight: '600' } } } },
                    plugins: { legend: { display: false } },
                    animation: { duration: 1500, easing: 'easeOutQuart' }
                }
            });

            // Trait Bar
            new Chart(document.getElementById('traitBar'), {
                type: 'bar',
                data: {
                    labels: ['Openness', 'Conscientiousness', 'Extraversion', 'Agreeableness', 'Neuroticism'],
                    datasets: [{ data: [sc.O, sc.C, sc.E, sc.A, sc.N], backgroundColor: ['#fb923c', '#34d399', '#f472b6', '#38bdf8', '#a78bfa'], borderRadius: 8, barThickness: 32 }]
                },
                options: {
                    indexAxis: 'y', responsive: true,
                    scales: { x: { max: 100, grid: { color: 'rgba(100,116,139,0.1)' }, ticks: { color: '#64748b' } }, y: { grid: { display: false }, ticks: { color: '#e2e8f0', font: { weight: '600' } } } },
                    plugins: { legend: { display: false } },
                    animation: { duration: 1200, easing: 'easeOutQuart' }
                }
            });

            // Time Heatmap
            const qLabels = Object.keys(A.tVals.length > 0 ? (attempt.timePerQuestion || {}) : {}).map((k, i) => `Q${i + 1}`);
            const timeData = Object.values(attempt.timePerQuestion || {}).map(Number);
            if (timeData.length > 0) {
                const maxT = Math.max(...timeData);
                new Chart(document.getElementById('timeChart'), {
                    type: 'bar',
                    data: {
                        labels: qLabels.length ? qLabels : timeData.map((_, i) => `Q${i + 1}`),
                        datasets: [{ data: timeData, backgroundColor: timeData.map(t => { const ratio = t / maxT; return ratio > 0.8 ? '#ef4444' : ratio > 0.6 ? '#f59e0b' : ratio > 0.3 ? '#22d3ee' : '#34d399'; }), borderRadius: 4, barThickness: 14 }]
                    },
                    options: {
                        responsive: true,
                        scales: { x: { grid: { display: false }, ticks: { color: '#64748b', font: { size: 10 } } }, y: { grid: { color: 'rgba(100,116,139,0.1)' }, ticks: { color: '#64748b' }, title: { display: true, text: 'Seconds', color: '#64748b' } } },
                        plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => `${ctx.raw.toFixed(1)}s` } } },
                        animation: { duration: 1000 }
                    }
                });
            } else {
                document.getElementById('timeChart').parentElement.innerHTML += '<p style="color:var(--muted);text-align:center;padding:40px">No per-question timing data available.</p>';
            }

            // Persistence Funnel
            new Chart(document.getElementById('funnelChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Answered', 'Skipped', 'Remaining'],
                    datasets: [{ data: [A.answered, A.skipped, Math.max(0, A.totalQ - A.answered - A.skipped)], backgroundColor: ['#22d3ee', '#f59e0b', '#1e293b'], borderColor: '#111827', borderWidth: 3, hoverOffset: 8 }]
                },
                options: {
                    responsive: true, cutout: '60%',
                    plugins: { legend: { position: 'bottom', labels: { color: '#e2e8f0', padding: 16, font: { size: 12 } } } },
                    animation: { animateRotate: true, duration: 1500 }
                }
            });
        }

        // ═══ ANIMATED COUNTERS ═══
        function animateCounters() {
            document.querySelectorAll('[data-count]').forEach(el => {
                const target = parseInt(el.dataset.count);
                let current = 0;
                const step = Math.max(1, Math.floor(target / 40));
                const timer = setInterval(() => {
                    current += step;
                    if (current >= target) { current = target; clearInterval(timer); }
                    el.textContent = current;
                }, 30);
            });
        }

        // ═══ PDF EXPORT ═══
        function initPDFExport() {
            document.getElementById('pdf-btn')?.addEventListener('click', async () => {
                const btn = document.getElementById('pdf-btn');
                btn.textContent = '⏳ Generating...'; btn.disabled = true;
                try {
                    const el = document.getElementById('report-root');
                    const canvas = await html2canvas(el, { backgroundColor: '#0a0e17', scale: 2, useCORS: true, logging: false });
                    const { jsPDF } = window.jspdf;
                    const imgW = 210;
                    const imgH = (canvas.height * imgW) / canvas.width;
                    const pdf = new jsPDF('p', 'mm', 'a4');
                    let pos = 0, pageH = 297;
                    while (pos < imgH) {
                        if (pos > 0) pdf.addPage();
                        pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, -pos, imgW, imgH);
                        pos += pageH;
                    }
                    pdf.save(`SCIR_${studentId}_${new Date().toISOString().slice(0, 10)}.pdf`);
                } catch (e) { console.error('PDF export failed:', e); }
                btn.textContent = '📥 Export PDF'; btn.disabled = false;
            });
        }

        init();
    </script>
</body>

</html>
