<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cognitive Forensic Dossier — AI Native Schools</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #060a12;
            --surface: #0c1220;
            --card: #111b2e;
            --card2: #152238;
            --border: #1a2744;
            --text: #e2e8f0;
            --muted: #64748b;
            --accent: #22d3ee;
            --accent2: #a78bfa;
            --accent3: #34d399;
            --accent4: #f472b6;
            --accent5: #fb923c;
            --danger: #ef4444;
            --warning: #f59e0b;
            --glass: rgba(12, 18, 32, 0.85);
            --glow: 0 0 30px rgba(34, 211, 238, 0.12)
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh
        }

        .dossier-wrap {
            max-width: 1440px;
            margin: 0 auto;
            padding: 24px 32px 80px
        }

        /* Header */
        .dossier-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 28px
        }

        .dossier-back {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: color .2s
        }

        .dossier-back:hover {
            color: var(--accent)
        }

        .dossier-title h1 {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .dossier-title p {
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 2px
        }

        .header-actions {
            display: flex;
            gap: 10px
        }

        .btn-action {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 9px 18px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--card);
            color: var(--text);
            font-family: inherit;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all .3s
        }

        .btn-action:hover {
            border-color: var(--accent);
            box-shadow: var(--glow)
        }

        .btn-action.primary {
            background: linear-gradient(135deg, #0891b2, #06b6d4);
            border: none;
            color: #fff
        }

        /* Meta Bar */
        .meta-bar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 28px
        }

        .meta-chip {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 12px
        }

        .meta-chip .lbl {
            color: var(--muted);
            font-weight: 500
        }

        .meta-chip .val {
            font-weight: 700
        }

        /* Section */
        .section {
            margin-bottom: 40px
        }

        .sec-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--muted);
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px
        }

        .sec-title::before {
            content: '';
            width: 4px;
            height: 14px;
            border-radius: 2px;
            background: linear-gradient(180deg, var(--accent), var(--accent2))
        }

        .sec-num {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            border-radius: 6px;
            background: rgba(34, 211, 238, 0.1);
            color: var(--accent);
            font-size: 10px;
            font-weight: 800;
            margin-right: 4px
        }

        /* Cards */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 24px;
            transition: box-shadow .3s
        }

        .card:hover {
            box-shadow: var(--glow)
        }

        .card h3 {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px
        }

        .card canvas {
            width: 100% !important
        }

        /* Grids */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px
        }

        .grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px
        }

        .grid-4 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 14px
        }

        .grid-5 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 14px
        }

        /* KPI */
        .kpi {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            position: relative;
            overflow: hidden
        }

        .kpi::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            border-radius: 14px 14px 0 0
        }

        .kpi:nth-child(1)::before {
            background: linear-gradient(90deg, #22d3ee, #06b6d4)
        }

        .kpi:nth-child(2)::before {
            background: linear-gradient(90deg, #a78bfa, #8b5cf6)
        }

        .kpi:nth-child(3)::before {
            background: linear-gradient(90deg, #34d399, #10b981)
        }

        .kpi:nth-child(4)::before {
            background: linear-gradient(90deg, #f472b6, #ec4899)
        }

        .kpi:nth-child(5)::before {
            background: linear-gradient(90deg, #fb923c, #f97316)
        }

        .kpi:nth-child(6)::before {
            background: linear-gradient(90deg, #38bdf8, #0ea5e9)
        }

        .kpi:nth-child(7)::before {
            background: linear-gradient(90deg, #a3e635, #84cc16)
        }

        .kpi:nth-child(8)::before {
            background: linear-gradient(90deg, #e879f9, #d946ef)
        }

        .kpi-label {
            font-size: 10px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
            margin-bottom: 6px
        }

        .kpi-value {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: -1px
        }

        .kpi-sub {
            font-size: 11px;
            color: var(--muted);
            margin-top: 2px
        }

        .c1 {
            color: #22d3ee
        }

        .c2 {
            color: #a78bfa
        }

        .c3 {
            color: #34d399
        }

        .c4 {
            color: #f472b6
        }

        .c5 {
            color: #fb923c
        }

        .c6 {
            color: #38bdf8
        }

        .c7 {
            color: #a3e635
        }

        .c8 {
            color: #e879f9
        }

        /* Table */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px
        }

        .data-table th {
            text-align: left;
            padding: 10px 12px;
            background: var(--card2);
            color: var(--muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 10px;
            border-bottom: 1px solid var(--border)
        }

        .data-table td {
            padding: 9px 12px;
            border-bottom: 1px solid rgba(26, 39, 68, 0.5)
        }

        .data-table tr:hover td {
            background: rgba(34, 211, 238, 0.03)
        }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.5px
        }

        .badge-cyan {
            background: rgba(34, 211, 238, 0.15);
            color: #22d3ee
        }

        .badge-green {
            background: rgba(52, 211, 153, 0.15);
            color: #34d399
        }

        .badge-amber {
            background: rgba(245, 158, 11, 0.15);
            color: #f59e0b
        }

        .badge-red {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444
        }

        .badge-purple {
            background: rgba(167, 139, 250, 0.15);
            color: #a78bfa
        }

        /* Gauge */
        .gauge-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 8px
        }

        .gauge-value {
            font-size: 36px;
            font-weight: 900;
            letter-spacing: -1px
        }

        .gauge-label {
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px
        }

        /* Tier badge */
        .tier-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            background: linear-gradient(135deg, rgba(34, 211, 238, 0.08), rgba(167, 139, 250, 0.08));
            border: 1px solid rgba(34, 211, 238, 0.2);
            border-radius: 14px;
            font-size: 16px;
            font-weight: 800;
            letter-spacing: -0.3px;
            margin-bottom: 8px
        }

        /* Footer */
        .dossier-footer {
            text-align: center;
            padding: 32px 0;
            border-top: 1px solid var(--border);
            margin-top: 40px;
            font-size: 11px;
            color: var(--muted)
        }

        /* Confidential watermark */
        .watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-35deg);
            font-size: 100px;
            font-weight: 900;
            color: rgba(34, 211, 238, 0.03);
            pointer-events: none;
            z-index: 0;
            letter-spacing: 10px;
            white-space: nowrap
        }

        /* Loading */
        .loading-state {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            flex-direction: column;
            gap: 16px
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        /* Responsive */
        @media(max-width:900px) {

            .grid-2,
            .grid-3 {
                grid-template-columns: 1fr
            }

            .dossier-wrap {
                padding: 16px
            }
        }

        @media(max-width:600px) {

            .grid-4,
            .grid-5 {
                grid-template-columns: 1fr 1fr
            }

            .meta-bar {
                flex-direction: column
            }
        }

        /* Print */
        @media print {
            body {
                background: #fff;
                color: #000
            }

            .dossier-wrap {
                padding: 0
            }

            .card,
            .kpi {
                break-inside: avoid;
                box-shadow: none;
                border: 1px solid #ddd
            }

            .watermark {
                display: none
            }
        }
    </style>
</head>

<body>
    <div class="watermark">CONFIDENTIAL</div>
    <div class="dossier-wrap" id="dossier-root">
        <div class="loading-state" id="loading">
            <div class="spinner"></div>
            <p style="color:var(--muted);font-size:13px">Generating Cognitive Forensic Dossier...</p>
        </div>
    </div>

    <!-- Existing Core Engines (read-only execution on snapshot) -->
    <script src="../../core/behavioral-risk-engine.js"></script>
    <script src="../../core/cognitive-growth-index.js"></script>
    <script src="../../core/correlation-engine.js"></script>
    <script src="../../core/dropout-model.js"></script>
    <script src="../../core/resilience-index.js"></script>
    <script src="../../core/strategy-profiler.js"></script>
    <script src="../../core/intervention-analytics.js"></script>
    <script src="../../core/governance.js"></script>
    <script src="../../core/escalation-engine.js"></script>
    <script src="../../core/narrative-generator.js"></script>

    <!-- Report Engine Modules -->
    <script src="../../core/report-engine/executive-summary.js"></script>
    <script src="../../core/report-engine/psychometric-mapping.js"></script>
    <script src="../../core/report-engine/cognitive-load-analysis.js"></script>
    <script src="../../core/report-engine/risk-decomposition.js"></script>
    <script src="../../core/report-engine/longitudinal-analysis.js"></script>
    <script src="../../core/report-engine/intervention-analytics.js"></script>
    <script src="../../core/report-engine/correlation-matrix.js"></script>
    <script src="../../core/report-engine/resilience-analysis.js"></script>
    <script src="../../core/report-engine/predictive-modeling.js"></script>
    <script src="../../core/report-engine/strategy-profiling.js"></script>
    <script src="../../core/report-engine/governance-audit.js"></script>
    <script src="../../core/report-engine/report-orchestrator.js"></script>

    <script src="./dossier-renderer.js"></script>
</body>

</html>
