<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Setup Password — AI Native Schools</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../styles.css" />
    <style>
        .auth-container {
            display: flex;
            min-height: 100vh;
            background: var(--bg);
            transition: all 0.4s ease;
        }

        .auth-form-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 48px;
            max-width: 540px;
            margin: 0 auto;
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .auth-header {
            margin-bottom: 40px;
            text-align: center;
        }

        .auth-title {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 12px;
            line-height: 1.1;
        }

        .auth-subtitle {
            font-size: 16px;
            color: var(--muted);
            line-height: 1.5;
        }

        .auth-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 48px;
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.05);
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .form-input {
            width: 100%;
            padding: 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            color: var(--text);
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(61, 90, 58, 0.1);
        }

        [data-theme="dark"] .form-input:focus {
            box-shadow: 0 0 0 4px rgba(181, 201, 154, 0.1);
        }

        .btn-primary {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'Outfit', sans-serif;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 32px;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(61, 90, 58, 0.2);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Password Strength */
        .pwd-strength-container {
            margin-top: 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
        }

        .pwd-bar-wrapper {
            display: flex;
            gap: 4px;
            margin-bottom: 12px;
        }

        .pwd-bar {
            height: 4px;
            flex: 1;
            background: var(--border);
            border-radius: 2px;
            transition: all 0.3s;
        }

        .pwd-label {
            font-size: 12px;
            font-weight: 600;
            text-align: right;
            margin-bottom: 12px;
            transition: color 0.3s;
        }

        .pwd-req-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .pwd-req {
            font-size: 12px;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.3s;
        }

        .pwd-req svg {
            width: 14px;
            height: 14px;
            stroke: var(--muted);
            transition: all 0.3s;
        }

        .pwd-req.met {
            color: var(--text);
        }

        .pwd-req.met svg {
            stroke: var(--C);
            /* Green */
        }

        /* Responsive */
        @media (max-width: 768px) {
            .auth-form-wrapper {
                padding: 24px;
            }

            .auth-card {
                padding: 32px 24px;
            }

            .pwd-req-list {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-form-wrapper">
            <div class="auth-header">
                <h1 class="auth-title">Welcome Aboard</h1>
                <p class="auth-subtitle">For your security, please create a strong, unique password before accessing
                    your dashboard.</p>
            </div>

            <div class="auth-card">
                <form id="setup-form">
                    <div class="form-group">
                        <label class="form-label">New Password</label>
                        <input type="password" id="new-password" class="form-input" placeholder="Enter new password"
                            required>

                        <div class="pwd-strength-container">
                            <div class="pwd-bar-wrapper" id="pwd-bars">
                                <div class="pwd-bar"></div>
                                <div class="pwd-bar"></div>
                                <div class="pwd-bar"></div>
                                <div class="pwd-bar"></div>
                            </div>
                            <div class="pwd-label" id="pwd-label" style="color: var(--muted)">Enter a password</div>

                            <ul class="pwd-req-list">
                                <li class="pwd-req" id="req-length">
                                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round">
                                        <circle cx="12" cy="12" r="10" />
                                        <path d="M9 12l2 2 4-4" />
                                    </svg>
                                    8+ characters
                                </li>
                                <li class="pwd-req" id="req-upper">
                                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round">
                                        <circle cx="12" cy="12" r="10" />
                                        <path d="M9 12l2 2 4-4" />
                                    </svg>
                                    1 uppercase
                                </li>
                                <li class="pwd-req" id="req-lower">
                                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round">
                                        <circle cx="12" cy="12" r="10" />
                                        <path d="M9 12l2 2 4-4" />
                                    </svg>
                                    1 lowercase
                                </li>
                                <li class="pwd-req" id="req-number">
                                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round">
                                        <circle cx="12" cy="12" r="10" />
                                        <path d="M9 12l2 2 4-4" />
                                    </svg>
                                    1 number
                                </li>
                                <li class="pwd-req" id="req-special">
                                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round">
                                        <circle cx="12" cy="12" r="10" />
                                        <path d="M9 12l2 2 4-4" />
                                    </svg>
                                    1 special char
                                </li>
                            </ul>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" id="confirm-password" class="form-input"
                            placeholder="Confirm new password" required>
                    </div>

                    <button type="submit" class="btn-primary" id="submit-btn" disabled>
                        Save Password
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        import { initThemeToggle } from '../js/ui.js';
        import { validatePasswordStrength } from '../js/password-utils.js';
        import { updatePassword } from '../js/auth-core.js';
        import { showToast } from '../js/toast.js';

        initThemeToggle();

        // Ensure user is logged in
        const sessionStr = localStorage.getItem('currentSession');
        if (!sessionStr) {
            window.location.href = '../index.html';
        }

        const session = JSON.parse(sessionStr);

        // UI Elements
        const newPwdInput = document.getElementById('new-password');
        const confirmPwdInput = document.getElementById('confirm-password');
        const submitBtn = document.getElementById('submit-btn');
        const pwdBars = document.getElementById('pwd-bars').children;
        const pwdLabel = document.getElementById('pwd-label');

        let isPwdValid = false;

        // Real-time strength evaluation
        newPwdInput.addEventListener('input', (e) => {
            const pwd = e.target.value;
            const evalResult = validatePasswordStrength(pwd);

            for (let i = 0; i < 4; i++) {
                pwdBars[i].style.background = i < evalResult.score ? evalResult.color : 'var(--border)';
            }

            if (pwd.length === 0) {
                pwdLabel.textContent = 'Enter a password';
                pwdLabel.style.color = 'var(--muted)';
            } else {
                pwdLabel.textContent = evalResult.label;
                pwdLabel.style.color = evalResult.color;
            }

            const reqs = evalResult.requirements;
            document.getElementById('req-length').className = 'pwd-req' + (reqs.length ? ' met' : '');
            document.getElementById('req-upper').className = 'pwd-req' + (reqs.upper ? ' met' : '');
            document.getElementById('req-lower').className = 'pwd-req' + (reqs.lower ? ' met' : '');
            document.getElementById('req-number').className = 'pwd-req' + (reqs.number ? ' met' : '');
            document.getElementById('req-special').className = 'pwd-req' + (reqs.special ? ' met' : '');

            isPwdValid = evalResult.isValid;
            checkFormValidity();
        });

        confirmPwdInput.addEventListener('input', checkFormValidity);

        function checkFormValidity() {
            const match = newPwdInput.value === confirmPwdInput.value;
            submitBtn.disabled = !(isPwdValid && match && newPwdInput.value.length > 0);
        }

        // Handle Submission
        document.getElementById('setup-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!isPwdValid) {
                showToast('error', 'Please meet all password requirements.');
                return;
            }

            if (newPwdInput.value !== confirmPwdInput.value) {
                showToast('error', 'Passwords do not match.');
                return;
            }

            submitBtn.innerHTML = '<div class="spinner" style="border-width:2px;width:16px;height:16px;border-top-color:white;display:inline-block"></div> Saving...';
            submitBtn.disabled = true;

            try {
                // Use centralized updatePassword from auth-core.js
                const success = await updatePassword(session.schoolCode, session.studentId, newPwdInput.value);

                if (success) {
                    console.log('Password setup complete for:', session.studentId);
                    showToast('success', 'Password created successfully!');

                    // Update session
                    session.isFirstLogin = false;
                    localStorage.setItem('currentSession', JSON.stringify(session));

                    await new Promise(r => setTimeout(r, 1200));
                    window.location.href = 'dashboard.html';
                } else {
                    showToast('error', 'Failed to update profile. Please contact support.');
                    submitBtn.innerHTML = 'Save Password';
                    submitBtn.disabled = false;
                }
            } catch (err) {
                console.error(err);
                showToast('error', 'An error occurred. Please try again.');
                submitBtn.innerHTML = 'Save Password';
                submitBtn.disabled = false;
            }
        });

    </script>
</body>

</html>
